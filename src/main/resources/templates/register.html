<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Модi</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link rel="stylesheet" href="/css/header.css"/>
    <link rel="stylesheet" href="/css/body.css"/>
    <link rel="stylesheet" href="/css/footer.css"/>
    <link rel="stylesheet" href="/css/auth/register.css"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">const id = [[${id}]];</script>

</head>
<body>
<div th:replace="~{common/header :: header}"></div>
<div id="content">
    <div>
        <div id="error" th:if="${error_status} == true">
            <b th:text="${error_message}"></b>
        </div>
    </div>
    <div id="registration-block">
        <b id="registration-title">Register</b>
        <form action="/register" method="post" enctype="multipart/form-data">
            <input id="name" name="username" type="text" placeholder="Enter your name" required>
            <input id="password" name="password" type="password" placeholder="Enter the password" required>
            <textarea id="description" name="description" placeholder="Enter your description" rows="10" cols="40"></textarea>
            <div id="avatar-block">
                <span id="avatar-label">Enter your avatar image</span>
                <input id="avatar" name="avatar" type="file">
            </div>
            <button id="registration-button" type="submit">register</button>
        </form>
        <a id="login-button" href="/login">already have account</a>
    </div>
</div>
<div th:replace="~{common/footer :: footer}"></div>
</body>
</html>
